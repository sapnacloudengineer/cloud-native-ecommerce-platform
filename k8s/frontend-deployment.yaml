apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: sapna201/pro-frontend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
